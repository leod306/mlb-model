<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLB Predictions</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>MLB Predictions</h1>
        <p class="muted">FiveThirtyEight-style cards for daily MLB model outputs.</p>
      </div>

      <nav class="nav">
        <a href="/">Home</a>
        <a href="/predictions">Predictions</a>
        <a href="/matchups">Matchups</a>
      </nav>
    </header>

    <section class="toolbar card">
      <div class="controls">
        <div class="controlGroup">
          <label for="game_date">Date</label>
          <input id="game_date" type="date" value="{{ game_date }}" />
        </div>

        <div class="controlActions">
          <button id="loadBtn" class="btn">Load Predictions</button>
        </div>
      </div>
    </section>

    <div id="status" class="status muted">Pick a date and click “Load Predictions”.</div>

    <div id="cards" class="grid"></div>
  </div>

<script>
const statusEl = document.getElementById("status");
const cardsEl = document.getElementById("cards");
const dateEl = document.getElementById("game_date");
const loadBtn = document.getElementById("loadBtn");

function pct(x) {
  return Math.round((Number(x) || 0) * 1000) / 10;
}

function safeVal(v, fallback = "") {
  return v === null || v === undefined ? fallback : v;
}

function cardHTML(p) {
  let body = "";

  if (!p.ok) {
    body = `<div class="warn">No prediction: ${safeVal(p.error, "missing features")}</div>`;
  } else {
    const winPct = pct(p.home_win_prob);

    body = `
      <div class="row metricsRow">
        <div class="metric">
          <div class="label">Home Win %</div>
          <div class="value">${winPct}%</div>
        </div>
        <div class="metric">
          <div class="label">Fair ML (Home)</div>
          <div class="value">${safeVal(p.home_moneyline_fair, "-")}</div>
        </div>
        <div class="metric">
          <div class="label">Proj Total</div>
          <div class="value">${safeVal(p.pred_total_runs, "-")}</div>
        </div>
        <div class="metric">
          <div class="label">Proj Run Diff</div>
          <div class="value">${safeVal(p.pred_run_diff, "-")}</div>
        </div>
      </div>

      <div class="bar">
        <div class="barFill" style="width:${Math.max(0, Math.min(100, winPct))}%"></div>
      </div>

      <div class="muted small">Win bar = P(home win)</div>
    `;
  }

  return `
    <div class="card">
      <div class="matchup">
        <div class="team">
          ${p.away_logo ? `<img src="${p.away_logo}" class="logo" alt="${safeVal(p.away_team, "Away")} logo" />` : ""}
          <div>
            <div class="abbr">${safeVal(p.away_team, "")}</div>
            <div class="muted small">${safeVal(p.away_starting_pitcher, "")}</div>
          </div>
        </div>

        <div class="at">@</div>

        <div class="team right">
          <div>
            <div class="abbr">${safeVal(p.home_team, "")}</div>
            <div class="muted small">${safeVal(p.home_starting_pitcher, "")}</div>
          </div>
          ${p.home_logo ? `<img src="${p.home_logo}" class="logo" alt="${safeVal(p.home_team, "Home")} logo" />` : ""}
        </div>
      </div>

      ${body}
    </div>
  `;
}

async function loadPredictions() {
  const d = dateEl.value;
  statusEl.textContent = "Loading...";
  cardsEl.innerHTML = "";

  try {
    const res = await fetch(`/api/predict/today?game_date=${encodeURIComponent(d)}`);
    const data = await res.json();

    if (!data.ok) {
      statusEl.textContent = "Error loading predictions.";
      return;
    }

    if (data.count === 0) {
      statusEl.textContent = `No games found for ${d}.`;
      return;
    }

    statusEl.textContent = `Loaded ${data.count} games for ${d}.`;
    cardsEl.innerHTML = data.predictions.map(cardHTML).join("");
  } catch (err) {
    console.error(err);
    statusEl.textContent = "Failed to load predictions.";
  }
}

loadBtn.addEventListener("click", loadPredictions);
</script>
</body>
</html>
