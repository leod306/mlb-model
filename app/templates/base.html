<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MLB Model{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">MLB Model</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/matchups">Matchups</a>
      <a href="/predictions">Predictions</a>
      <a href="/stats">Stats</a>
      <a href="/props">Props</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <!-- Global AI Chat Widget -->
  <button id="ai-chat-btn" title="Ask AI Analyst" onclick="toggleChat()">🤖</button>

  <div id="ai-chat-panel">
    <div class="chat-header">
      <div class="chat-header-title">
        <div class="chat-ai-dot"></div>
        AI Analyst
      </div>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg ai">
        Hey! Ask me about any pick — a player prop, game prediction, or just "what are your top plays today?"
      </div>
    </div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask about any pick..."
             onkeydown="if(event.key==='Enter') sendChat()">
      <button id="chat-send" onclick="sendChat()">Send</button>
    </div>
  </div>

  <script>
    let chatOpen = false;
    let chatStreaming = false;
    let _todayContext = null;

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    async function loadTodayContext() {
      if (_todayContext) return _todayContext;
      try {
        const d = todayStr();
        const [propsRes, predsRes] = await Promise.all([
          fetch(`/api/props?prop_date=${d}`),
          fetch(`/api/predict/today?game_date=${d}`)
        ]);
        const propsData = await propsRes.json();
        const predsData = await predsRes.json();

        const topProps = (propsData.props || []).slice(0, 12).map(p => ({
          player: p.player_name,
          team: p.player_team,
          matchup: `${p.away_team} @ ${p.home_team}`,
          prop: p.prop_type,
          line: p.line,
          projection: p.projection,
          edge: p.edge,
          pick: p.pick,
          confidence: p.confidence
        }));

        const topPreds = (predsData.predictions || [])
          .filter(p => p.ok)
          .slice(0, 8)
          .map(p => ({
            matchup: `${p.away_team} @ ${p.home_team}`,
            away_sp: p.away_starting_pitcher || 'TBD',
            home_sp: p.home_starting_pitcher || 'TBD',
            ml_pick: p.ml_pick,
            rl_pick: p.runline_pick,
            ou_pick: p.ou_pick,
            model_home_win_pct: p.home_win_prob ? Math.round(p.home_win_prob * 1000) / 10 + '%' : null,
            market_home_win_pct: p.market_home_prob ? Math.round(p.market_home_prob * 1000) / 10 + '%' : null,
            pred_total: p.pred_total_runs,
            vegas_total: p.market_total_line,
            model_edge: p.model_edge ? Math.round(p.model_edge * 1000) / 10 + '%' : null,
            is_top_play: !!p.play_rank,
            play_detail: p.play_detail
          }));

        _todayContext = { date: d, top_props: topProps, predictions: topPreds };
      } catch (e) {
        _todayContext = {};
      }
      return _todayContext;
    }

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('ai-chat-panel').classList.toggle('open', chatOpen);
      if (chatOpen) {
        setTimeout(() => document.getElementById('chat-input').focus(), 200);
        loadTodayContext(); // pre-fetch in background
      }
    }

    async function sendChat(prefillMsg, prefillCtx) {
      if (chatStreaming) return;
      const input = document.getElementById('chat-input');
      const msg   = prefillMsg || input.value.trim();
      if (!msg) return;

      // Use prefill context if provided, otherwise inject today's model data
      const ctx = prefillCtx || await loadTodayContext();

      if (!chatOpen) toggleChat();

      const msgsEl = document.getElementById('chat-messages');
      const userDiv = document.createElement('div');
      userDiv.className = 'chat-msg user';
      userDiv.textContent = msg;
      msgsEl.appendChild(userDiv);
      if (!prefillMsg) input.value = '';

      const aiMsg = document.createElement('div');
      aiMsg.className = 'chat-msg ai streaming';
      msgsEl.appendChild(aiMsg);
      msgsEl.scrollTop = msgsEl.scrollHeight;

      chatStreaming = true;
      document.getElementById('chat-send').disabled = true;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: msg, context: ctx})
        });
        const reader = res.body.getReader();
        const dec    = new TextDecoder();
        let buf      = '';

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          buf += dec.decode(value, {stream: true});
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') break;
            try {
              const obj = JSON.parse(payload);
              if (obj.text) aiMsg.textContent += obj.text;
            } catch {}
          }
          msgsEl.scrollTop = msgsEl.scrollHeight;
        }
      } catch (e) {
        aiMsg.textContent = 'Connection error — try again.';
      }

      aiMsg.classList.remove('streaming');
      chatStreaming = false;
      document.getElementById('chat-send').disabled = false;
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    // Pages call this to pre-load pick context into chat
    window.explainPick = function(msg, ctx) { sendChat(msg, ctx); };
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
