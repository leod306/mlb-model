{% extends "base.html" %}

{% block title %}Predictions{% endblock %}

{% block content %}
<header>
  <h1>MLB Predictions</h1>
  <p>Moneyline • Run Line • Totals • Probable Starters</p>
</header>

<div style="margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap; align-items:end;">
  <div>
    <label for="game_date"><strong>Date</strong></label><br>
    <input id="game_date" type="date" value="{{ game_date }}">
  </div>

  <div>
    <label for="teamSearch"><strong>Search Team</strong></label><br>
    <input
      id="teamSearch"
      type="text"
      placeholder="Search team..."
      style="padding:6px 10px; min-width:220px;"
    >
  </div>

  <div>
    <button id="loadBtn" type="button">Load Predictions</button>
  </div>
</div>

<div id="status" class="stats">Click "Load Predictions".</div>
<div id="cards"></div>

<style>
  .picks-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .pick-badge {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    background: #0f172a;
    border: 1px solid #334155;
    color: #e2e8f0;
  }
  .pick-badge.home  { border-color: #3b82f6; color: #3b82f6; }
  .pick-badge.away  { border-color: #f59e0b; color: #f59e0b; }
  .pick-badge.over  { border-color: #10b981; color: #10b981; }
  .pick-badge.under { border-color: #ef4444; color: #ef4444; }

  .odds-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }
  .odds-box {
    background: #0f172a;
    border-radius: 8px;
    padding: 10px 14px;
    border: 1px solid #1e293b;
  }
  .odds-box .label {
    font-size: 10px;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }
  .odds-box .value {
    font-size: 15px;
    font-weight: 700;
    color: #e2e8f0;
  }
  .odds-box .sub {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
  }

  .edge-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
  }
  .edge-pos { background: #064e3b; color: #34d399; }
  .edge-neg { background: #450a0a; color: #f87171; }
  .edge-neu { background: #1e293b; color: #94a3b8; }

  .section-label {
    font-size: 11px;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin: 14px 0 6px;
  }

  .market-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .ml-chip {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    background: #1e293b;
    color: #94a3b8;
  }
  .ml-chip.best {
    background: #1e3a5f;
    color: #60a5fa;
  }
</style>
{% endblock %}

{% block scripts %}
<script>
const statusEl = document.getElementById("status");
const cardsEl  = document.getElementById("cards");
const dateEl   = document.getElementById("game_date");
const loadBtn  = document.getElementById("loadBtn");
const searchEl = document.getElementById("teamSearch");

function pct(x) {
  if (x === null || x === undefined || isNaN(Number(x))) return "—";
  return Math.round(Number(x) * 1000) / 10;
}

function fmtNum(x, digits = 2) {
  if (x === null || x === undefined || isNaN(Number(x))) return "—";
  return Number(x).toFixed(digits);
}

function fmtML(x) {
  if (x === null || x === undefined || isNaN(Number(x))) return "—";
  const n = Number(x);
  return n > 0 ? `+${n}` : `${n}`;
}

function edgeBadge(edge) {
  if (edge === null || edge === undefined || isNaN(Number(edge))) return "";
  const e = Number(edge);
  const pctStr = (e >= 0 ? "+" : "") + Math.round(e * 1000) / 10 + "%";
  const cls = e >= 0.03 ? "edge-pos" : e <= -0.03 ? "edge-neg" : "edge-neu";
  return `<span class="edge-badge ${cls}">${pctStr} edge</span>`;
}

function pickClass(pick) {
  if (!pick) return "";
  const p = String(pick).toUpperCase();
  if (p === "OVER") return "over";
  if (p === "UNDER") return "under";
  if (p === "PASS") return "";

  if (p.includes("-1.5") || p.includes("+1.5")) {
    return "";
  }

  return "";
}

function weatherBadge(p) {
  if (p.is_dome) {
    return `<div style="margin-top:10px;font-size:11px;color:var(--text3);">🏟️ Dome — weather N/A</div>`;
  }
  if (p.temp_f == null && p.wind_speed_mph == null) return "";

  const parts = [];
  if (p.temp_f != null) parts.push(`🌡️ ${Math.round(p.temp_f)}°F`);

  if (p.wind_speed_mph != null) {
    const spd = Math.round(p.wind_speed_mph);
    const wof = p.wind_out_factor;
    let dir = "";
    if (wof != null) {
      if (wof > 0.3) dir = " OUT";
      else if (wof < -0.3) dir = " IN";
      else dir = " X-WIND";
    }
    const color = wof > 0.5 ? "#f87171" : wof < -0.5 ? "#60a5fa" : "var(--text2)";
    parts.push(`<span style="color:${color}">💨 ${spd}mph${dir}</span>`);
  }

  if (p.precip_prob != null && p.precip_prob > 10) {
    const color = p.precip_prob > 50 ? "#f87171" : "#fbbf24";
    parts.push(`<span style="color:${color}">🌧️ ${Math.round(p.precip_prob)}% rain</span>`);
  }

  if (p.visibility_m != null && p.visibility_m < 5000) {
    const vis_mi = (p.visibility_m / 1609).toFixed(1);
    parts.push(`<span style="color:#f87171">🌫️ ${vis_mi}mi vis</span>`);
  }

  if (parts.length === 0) return "";
  return `<div style="margin-top:10px;font-size:11px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;">${parts.join("")}</div>`;
}

function cardHTML(p, i) {
  // Use rd_home_win_prob (derived from run diff model) as the primary win %
  // because that's what drives the ML pick. Fall back to calibrated win prob.
  const rawWinProb = p.rd_home_win_prob != null ? p.rd_home_win_prob : p.home_win_prob;
  const winPct = pct(rawWinProb);
  const awayWinPct = (winPct === "—") ? "—" : Math.round((100 - Number(winPct)) * 10) / 10;
  const barWidth = rawWinProb != null ? Math.max(0, Math.min(100, rawWinProb * 100)) : 0;

  const hasMkt =
    p.market_home_prob != null ||
    p.market_away_prob != null ||
    p.market_total_line != null ||
    p.market_home_ml != null ||
    p.market_away_ml != null ||
    p.best_home_ml != null ||
    p.best_away_ml != null;

  const mktPct = hasMkt ? pct(p.market_home_prob) : null;

  return `
    <div class="game-card ${p.play_rank ? 'top-play-card' : ''}">

      ${p.play_rank ? `
        <div class="top-play-badge">
          ⭐ Top Play #${p.play_rank}
          ${p.play_type ? `<span class="top-play-type">${p.play_type}</span>` : ""}
        </div>
        ${p.play_detail ? `<div class="top-play-detail">${p.play_detail}</div>` : ""}
      ` : ""}

      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap;">
        ${p.away_logo ? `<img src="${p.away_logo}" alt="${p.away_team}" style="width:36px;height:36px;">` : ""}
        <div class="teams">${p.away_team || "Away"} @ ${p.home_team || "Home"}</div>
        ${p.home_logo ? `<img src="${p.home_logo}" alt="${p.home_team}" style="width:36px;height:36px;">` : ""}
      </div>

      <div class="stats">
        Away SP: ${p.away_starting_pitcher || p.away_sp_name || "TBD"}<br>
        Home SP: ${p.home_starting_pitcher || p.home_sp_name || "TBD"}
      </div>

      ${p.ok ? `
        <div class="picks-row">
          <span class="pick-badge ${pickClass(p.ml_pick)}">ML: ${p.ml_pick || "—"}</span>
          <span class="pick-badge ${pickClass(p.runline_pick)}">RL: ${p.runline_pick || "—"}</span>
          <span class="pick-badge ${pickClass(p.ou_pick)}">O/U: ${p.ou_pick || "—"}</span>
        </div>

        <div class="section-label">Model</div>
        <div class="odds-grid">
          <div class="odds-box">
            <div class="label">Home Win %</div>
            <div class="value">${winPct === "—" ? "—" : winPct + "%"}${edgeBadge(p.model_edge)}</div>
            <div class="sub">Fair ML: ${fmtML(p.home_moneyline_fair || p.home_ml_implied)}</div>
            <div class="sub">CI: ${pct(p.home_win_prob_lo)}% to ${pct(p.home_win_prob_hi)}%</div>
          </div>

          <div class="odds-box">
            <div class="label">Away Win %</div>
            <div class="value">${awayWinPct === "—" ? "—" : awayWinPct + "%"}</div>
            <div class="sub">Fair ML: ${fmtML(p.away_moneyline_fair || p.away_ml_implied)}</div>
          </div>

          <div class="odds-box">
            <div class="label">Predicted Total</div>
            <div class="value">${fmtNum(p.pred_total_runs || p.total_runs_pred)}</div>
            <div class="sub">CI: ${fmtNum(p.total_runs_lo, 2)} to ${fmtNum(p.total_runs_hi, 2)}</div>
          </div>

          <div class="odds-box">
            <div class="label">Run Diff</div>
            <div class="value">${fmtNum(p.pred_run_diff || p.run_diff_pred)}</div>
            <div class="sub">CI: ${fmtNum(p.run_diff_lo, 2)} to ${fmtNum(p.run_diff_hi, 2)}</div>
          </div>
        </div>

        ${hasMkt ? `
          <div class="section-label">Market (Vegas Consensus)</div>
          <div class="odds-grid">
            <div class="odds-box">
              <div class="label">Home Implied %</div>
              <div class="value">${mktPct !== null ? mktPct + "%" : "—"}</div>
              <div class="sub">Consensus ML: ${fmtML(p.market_home_ml)}</div>
            </div>

            <div class="odds-box">
              <div class="label">Away Implied %</div>
              <div class="value">${mktPct !== null ? Math.round((100 - Number(mktPct)) * 10) / 10 + "%" : "—"}</div>
              <div class="sub">Consensus ML: ${fmtML(p.market_away_ml)}</div>
            </div>

            <div class="odds-box">
              <div class="label">O/U Line</div>
              <div class="value">${p.market_total_line !== null ? p.market_total_line : "—"}</div>
              <div class="sub">Best home: ${fmtML(p.best_home_ml)} | Away: ${fmtML(p.best_away_ml)}</div>
            </div>
          </div>
        ` : `
          <div class="stats" style="margin-top:10px; color:#475569; font-size:12px;">
            No market odds available for this game.
          </div>
        `}

        <div class="confidence-bar">
          <div class="confidence-fill" style="width:${barWidth}%"></div>
        </div>

        ${weatherBadge(p)}

        <button onclick="explainGame(${i})" style="margin-top:12px;padding:6px 14px;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:6px;cursor:pointer;transition:all .15s;"
          onmouseover="this.style.borderColor='var(--blue)';this.style.color='#93c5fd';this.style.background='var(--blue-dim)'"
          onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)';this.style.background='transparent'">
          🤖 Explain this pick
        </button>

      ` : `
        <div class="stats" style="margin-top:14px;">
          No prediction available${p.error ? `: ${p.error}` : "."}
        </div>
      `}
    </div>
  `;
}

function applySearchFilter() {
  const query = (searchEl.value || "").trim().toLowerCase();
  const cards = document.querySelectorAll(".game-card");

  cards.forEach(card => {
    const text = card.innerText.toLowerCase();
    card.style.display = text.includes(query) ? "" : "none";
  });
}

async function loadPredictions() {
  try {
    const d = dateEl.value;
    statusEl.textContent = "Loading...";
    cardsEl.innerHTML = "";

    const res = await fetch(`/api/predict/today?game_date=${encodeURIComponent(d)}`);
    if (!res.ok) {
      statusEl.textContent = `Request failed: ${res.status}`;
      return;
    }

    const data = await res.json();
    if (!data.ok) {
      statusEl.textContent = "API returned an error.";
      return;
    }
    if (!data.predictions || data.predictions.length === 0) {
      statusEl.textContent = `No predictions found for ${d}.`;
      return;
    }

    data.predictions.sort((a, b) => {
      if (a.play_rank && b.play_rank) return a.play_rank - b.play_rank;
      if (a.play_rank) return -1;
      if (b.play_rank) return 1;
      return 0;
    });

    statusEl.textContent = `Loaded ${data.count} games for ${d}.`;
    window._predictions = data.predictions;
    cardsEl.innerHTML = data.predictions.map((p, i) => cardHTML(p, i)).join("");
    applySearchFilter();
  } catch (err) {
    console.error(err);
    statusEl.textContent = "JavaScript error loading predictions.";
  }
}

function explainGame(i) {
  const p = (window._predictions || [])[i];
  if (!p) return;
  const matchup = `${p.away_team} @ ${p.home_team}`;
  const winPct = p.home_win_prob ? Math.round(p.home_win_prob * 1000) / 10 : null;
  const mktPct = p.market_home_prob ? Math.round(p.market_home_prob * 1000) / 10 : null;
  window.explainPick(
    `Explain the model's picks for ${matchup}: ML ${p.ml_pick}, RL ${p.runline_pick}, O/U ${p.ou_pick}.`,
    {
      matchup, away_team: p.away_team, home_team: p.home_team,
      away_sp: p.away_starting_pitcher || "TBD",
      home_sp: p.home_starting_pitcher || "TBD",
      model_home_win_pct: winPct ? winPct + "%" : null,
      market_home_win_pct: mktPct ? mktPct + "%" : null,
      model_edge: p.model_edge ? Math.round(p.model_edge * 1000) / 10 + "%" : null,
      ml_pick: p.ml_pick, rl_pick: p.runline_pick, ou_pick: p.ou_pick,
      pred_total: p.pred_total_runs, vegas_total: p.market_total_line,
      fair_home_ml: p.home_moneyline_fair, market_home_ml: p.market_home_ml,
      is_top_play: !!p.play_rank, play_detail: p.play_detail
    }
  );
}

loadBtn.addEventListener("click", loadPredictions);
searchEl.addEventListener("input", applySearchFilter);
document.addEventListener("DOMContentLoaded", loadPredictions);
</script>
{% endblock %}
