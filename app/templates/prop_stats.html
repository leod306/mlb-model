{% extends "base.html" %}
{% block title %}Prop Results{% endblock %}
{% block content %}

<style>
  /* Filter bar — matches props page */
  .filter-bar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: .75rem 1rem;
    margin-bottom: 1.25rem; display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; width: 100%; }
  .filter-row + .filter-row { padding-top: .5rem; border-top: 1px solid var(--border); }
  .flabel { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); align-self: center; margin-right: .1rem; white-space: nowrap; }
  .fdivider { width: 1px; background: var(--border); align-self: stretch; margin: 0 .2rem; }
  .fgroup { display: flex; gap: .25rem; background: var(--bg2); border-radius: 8px; padding: 3px; flex-wrap: wrap; }
  .fb { padding: 4px 11px; border-radius: 6px; border: none; background: transparent; font-size: .78rem; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .12s; white-space: nowrap; }
  .fb:hover { background: var(--border); color: var(--text1); }
  .fb.active { background: var(--bg3); color: var(--text1); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
  .fselect { padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); font-size: .78rem; color: var(--text1); background: var(--bg2); cursor: pointer; }
  .filter-count { font-size: .78rem; color: var(--text3); margin-left: auto; }
  .filter-count strong { color: var(--text1); }

  /* Summary cards */
  .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { border-radius: 14px; padding: 1.25rem 1.5rem; }
  .stat-card.green  { background: rgba(21,128,61,.12);  border: 1px solid rgba(21,128,61,.3); }
  .stat-card.red    { background: rgba(190,18,60,.12);  border: 1px solid rgba(190,18,60,.3); }
  .stat-card.yellow { background: rgba(161,98,7,.12);   border: 1px solid rgba(161,98,7,.3); }
  .stat-card .label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: .5rem; }
  .stat-card .pct   { font-size: 2.5rem; font-weight: 700; line-height: 1; margin-bottom: .25rem; }
  .stat-card.green  .pct { color: #4ade80; }
  .stat-card.red    .pct { color: #fb7185; }
  .stat-card.yellow .pct { color: #fbbf24; }
  .stat-card .record { font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--text3); }
  .stat-card .vs-be  { font-size: .75rem; font-weight: 600; margin-top: .4rem; padding: 2px 8px; border-radius: 20px; display: inline-block; }
  .stat-card.green  .vs-be { background: rgba(74,222,128,.15); color: #4ade80; }
  .stat-card.red    .vs-be { background: rgba(251,113,133,.15); color: #fb7185; }
  .stat-card.yellow .vs-be { background: rgba(251,191,36,.15); color: #fbbf24; }

  .section-title {
    font-size: 1rem; font-weight: 600; color: var(--text1);
    margin: 2rem 0 1rem; display: flex; align-items: center; gap: .5rem;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; }

  /* Type breakdown table */
  .type-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  .type-table th { text-align: left; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
  .type-table th.r { text-align: right; }
  .type-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); color: var(--text1); }
  .type-table td.r { text-align: right; font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--text2); }
  .type-table tr:last-child td { border-bottom: none; }
  .type-table tr:hover td { background: var(--bg2); }
  .pct-bar-wrap { display: flex; align-items: center; gap: .5rem; }
  .pct-bar { height: 6px; border-radius: 3px; flex-shrink: 0; }
  .pct-val { font-family: 'DM Mono', monospace; font-size: .8rem; font-weight: 500; white-space: nowrap; }

  /* Recent props table */
  .recent-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .recent-table th { text-align: left; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); padding: .5rem .6rem; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--card); }
  .recent-table th.r { text-align: right; }
  .recent-table td { padding: .55rem .6rem; border-bottom: 1px solid var(--border); color: var(--text1); }
  .recent-table td.r { text-align: right; font-family: 'DM Mono', monospace; color: var(--text2); }
  .recent-table tr:last-child td { border-bottom: none; }
  .recent-table tr:hover td { background: var(--bg2); }
  .table-scroll { max-height: 520px; overflow-y: auto; border-radius: 0 0 14px 14px; }

  .ps-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .7rem; font-weight: 700; letter-spacing: .04em; }
  .ps-badge.win   { background: rgba(74,222,128,.15);  color: #4ade80; }
  .ps-badge.loss  { background: rgba(251,113,133,.15); color: #fb7185; }
  .ps-badge.push  { background: var(--bg2); color: var(--text3); }
  .ps-badge.over  { background: rgba(96,165,250,.15);  color: #60a5fa; }
  .ps-badge.under { background: rgba(192,132,252,.15); color: #c084fc; }

  .no-data { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .no-data .icon { font-size: 2.5rem; margin-bottom: .75rem; }
  .no-data p { font-size: .9rem; }
  .no-data code { background: var(--bg2); padding: 2px 6px; border-radius: 4px; font-size: .8rem; }

  @media (max-width: 640px) {
    .card-grid { grid-template-columns: 1fr 1fr; }
    .card-grid .stat-card:last-child { grid-column: 1 / -1; }
  }
</style>

<header>
  <h1>Player Prop Results</h1>
  <p>Graded picks vs actual MLB boxscore stats · Break-even = 52.4%</p>
</header>

<div id="filter-bar-wrap"></div>
<div id="ps-content">
  <div class="no-data"><div class="icon">⏳</div><p>Loading…</p></div>
</div>

<script>
const BREAK_EVEN = 52.4;
const PROP_LABELS = {
  batter_hits: 'Hits', batter_total_bases: 'Total Bases', batter_home_runs: 'Home Runs',
  batter_rbis: 'RBIs', batter_runs_scored: 'Runs Scored', batter_stolen_bases: 'Stolen Bases',
  batter_walks: 'Walks', batter_hits_runs_rbis: 'H+R+RBI',
  pitcher_strikeouts: 'Pitcher Ks', pitcher_outs: 'Pitcher Outs',
};

let ALL_PROPS = [];
let TEAMS = [];
let PROP_TYPES = [];
let filters = { days: 'all', prop_type: 'all', team: 'all', pick: 'all', result: 'all' };

function cardColor(pct) {
  if (pct >= BREAK_EVEN + 2) return 'green';
  if (pct >= BREAK_EVEN) return 'yellow';
  return 'red';
}
function fmtPct(n) { return n != null ? n.toFixed(1) + '%' : '—'; }

/* ── Filter logic ── */
function applyFilters() {
  const now = new Date();
  return ALL_PROPS.filter(r => {
    if (filters.days !== 'all') {
      const d = new Date(r.date); const diff = (now - d) / 86400000;
      if (diff > parseInt(filters.days)) return false;
    }
    if (filters.prop_type !== 'all' && r.prop_type !== filters.prop_type) return false;
    if (filters.team !== 'all' && r.player_team !== filters.team) return false;
    if (filters.pick !== 'all' && r.pick !== filters.pick) return false;
    if (filters.result !== 'all' && r.result !== filters.result) return false;
    return true;
  });
}

/* ── Compute aggregates from raw rows ── */
function computeStats(rows) {
  const wins = rows.filter(r => r.result === 'WIN').length;
  const losses = rows.filter(r => r.result === 'LOSS').length;
  const pushes = rows.filter(r => r.result === 'PUSH').length;
  const total = wins + losses + pushes;
  const win_pct = (wins + losses) > 0 ? round1(wins / (wins + losses) * 100) : 0;

  const by_pick = {};
  ['OVER','UNDER'].forEach(p => {
    const sub = rows.filter(r => r.pick === p);
    const w = sub.filter(r => r.result === 'WIN').length;
    const l = sub.filter(r => r.result === 'LOSS').length;
    by_pick[p] = { wins: w, losses: l, pushes: sub.filter(r => r.result === 'PUSH').length, win_pct: (w+l) > 0 ? round1(w/(w+l)*100) : 0 };
  });

  const by_type_map = {};
  rows.forEach(r => {
    if (!by_type_map[r.prop_type]) by_type_map[r.prop_type] = { wins:0, losses:0, pushes:0 };
    if (r.result === 'WIN') by_type_map[r.prop_type].wins++;
    else if (r.result === 'LOSS') by_type_map[r.prop_type].losses++;
    else if (r.result === 'PUSH') by_type_map[r.prop_type].pushes++;
  });
  const by_type = Object.entries(by_type_map).map(([pt, v]) => {
    const tot = v.wins + v.losses + v.pushes;
    return { prop_type: pt, ...v, total: tot, win_pct: (v.wins+v.losses) > 0 ? round1(v.wins/(v.wins+v.losses)*100) : 0 };
  }).sort((a,b) => b.total - a.total);

  return { summary: { wins, losses, pushes, total, win_pct }, by_pick, by_type };
}

function round1(n) { return Math.round(n * 10) / 10; }

/* ── Render ── */
function renderFilterBar(totalAll) {
  const filtered = applyFilters().length;
  const teamOpts = ['all', ...TEAMS].map(t =>
    `<option value="${t}" ${filters.team === t ? 'selected' : ''}>${t === 'all' ? 'All Teams' : t}</option>`
  ).join('');

  document.getElementById('filter-bar-wrap').innerHTML = `
  <div class="filter-bar">
    <div class="filter-row">
      <span class="flabel">Range</span>
      <div class="fgroup">
        ${['all','7','14','30'].map(v => `<button class="fb ${filters.days===v?'active':''}" onclick="setFilter('days','${v}')">${v==='all'?'All':'Last '+v+'d'}</button>`).join('')}
      </div>
      <div class="fdivider"></div>
      <span class="flabel">Team</span>
      <select class="fselect" onchange="setFilter('team',this.value)">${teamOpts}</select>
      <div class="fdivider"></div>
      <span class="flabel">Pick</span>
      <div class="fgroup">
        ${['all','OVER','UNDER'].map(v => `<button class="fb ${filters.pick===v?'active':''}" onclick="setFilter('pick','${v}')">${v==='all'?'All':v}</button>`).join('')}
      </div>
      <div class="fdivider"></div>
      <span class="flabel">Result</span>
      <div class="fgroup">
        ${['all','WIN','LOSS'].map(v => `<button class="fb ${filters.result===v?'active':''}" onclick="setFilter('result','${v}')">${v==='all'?'All':v}</button>`).join('')}
      </div>
      <span class="filter-count" style="margin-left:auto"><strong>${filtered}</strong> of ${totalAll} props</span>
    </div>
    <div class="filter-row">
      <span class="flabel">Prop</span>
      <div class="fgroup">
        <button class="fb ${filters.prop_type==='all'?'active':''}" onclick="setFilter('prop_type','all')">All</button>
        ${PROP_TYPES.map(k => `<button class="fb ${filters.prop_type===k?'active':''}" onclick="setFilter('prop_type','${k}')">${PROP_LABELS[k]||k}</button>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderCards(stats) {
  const { summary, by_pick } = stats;
  const be_diff = (summary.win_pct - BREAK_EVEN).toFixed(1);
  const be_sign = be_diff >= 0 ? '+' : '';
  const cards = [
    { label: 'Overall', pct: summary.win_pct,
      rec: `${summary.wins}W – ${summary.losses}L – ${summary.pushes}P`,
      color: cardColor(summary.win_pct), be: be_sign + be_diff + '% vs break-even' },
    { label: 'OVERs', pct: by_pick.OVER?.win_pct ?? 0,
      rec: by_pick.OVER ? `${by_pick.OVER.wins}W – ${by_pick.OVER.losses}L` : '—',
      color: cardColor(by_pick.OVER?.win_pct ?? 0), be: null },
    { label: 'UNDERs', pct: by_pick.UNDER?.win_pct ?? 0,
      rec: by_pick.UNDER ? `${by_pick.UNDER.wins}W – ${by_pick.UNDER.losses}L` : '—',
      color: cardColor(by_pick.UNDER?.win_pct ?? 0), be: null },
  ];
  return `<div class="card-grid">${cards.map(c => `
    <div class="stat-card ${c.color}">
      <div class="label">${c.label}</div>
      <div class="pct">${fmtPct(c.pct)}</div>
      <div class="record">${c.rec}</div>
      ${c.be ? `<div class="vs-be">${c.be}</div>` : ''}
    </div>`).join('')}</div>`;
}

function renderTypeTable(by_type) {
  if (!by_type.length) return '<p style="color:#94a3b8;font-size:.85rem;padding:.5rem">No data for this filter.</p>';
  const rows = by_type.map(r => {
    const barW = Math.round((r.win_pct / 100) * 120);
    const color = r.win_pct >= BREAK_EVEN + 2 ? '#22c55e' : r.win_pct >= BREAK_EVEN ? '#f59e0b' : '#f43f5e';
    return `<tr>
      <td>${PROP_LABELS[r.prop_type] || r.prop_type}</td>
      <td class="r">${r.wins}</td><td class="r">${r.losses}</td><td class="r">${r.pushes}</td>
      <td class="r">${r.total}</td>
      <td class="r"><div class="pct-bar-wrap">
        <div class="pct-bar" style="width:${barW}px;background:${color}"></div>
        <span class="pct-val" style="color:${color}">${fmtPct(r.win_pct)}</span>
      </div></td>
    </tr>`;
  }).join('');
  return `<table class="type-table">
    <thead><tr>
      <th>Prop Type</th><th class="r">W</th><th class="r">L</th><th class="r">P</th><th class="r">Total</th><th class="r">Win %</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

function renderRecentTable(rows) {
  if (!rows.length) return '<p style="color:#94a3b8;font-size:.85rem;padding:1rem">No props match this filter.</p>';
  const trs = rows.slice(0, 200).map(r => {
    const res_cls = r.result === 'WIN' ? 'win' : r.result === 'LOSS' ? 'loss' : 'push';
    const pick_cls = r.pick === 'OVER' ? 'over' : 'under';
    const edge_sign = r.edge > 0 ? '+' : '';
    const edge_color = r.edge > 0 ? '#15803d' : '#be123c';
    return `<tr>
      <td>${r.date}</td>
      <td><strong>${r.player_name}</strong><br><span style="color:#94a3b8;font-size:.7rem">${r.player_team}</span></td>
      <td>${PROP_LABELS[r.prop_type] || r.prop_type}</td>
      <td class="r">${r.line ?? '—'}</td>
      <td class="r">${r.projection != null ? r.projection.toFixed(2) : '—'}</td>
      <td class="r" style="color:${edge_color};font-weight:600">${edge_sign}${r.edge != null ? (r.edge*100).toFixed(1) : '—'}%</td>
      <td><span class="ps-badge ${pick_cls}">${r.pick}</span></td>
      <td class="r">${r.actual_value ?? '—'}</td>
      <td><span class="ps-badge ${res_cls}">${r.result}</span></td>
    </tr>`;
  }).join('');
  return `<div class="table-scroll"><table class="recent-table">
    <thead><tr>
      <th>Date</th><th>Player</th><th>Prop</th>
      <th class="r">Line</th><th class="r">Proj</th><th class="r">Edge</th>
      <th>Pick</th><th class="r">Actual</th><th>Result</th>
    </tr></thead><tbody>${trs}</tbody>
  </table></div>`;
}

function renderAll() {
  const filtered = applyFilters();
  const stats = computeStats(filtered);
  renderFilterBar(ALL_PROPS.length);
  document.getElementById('ps-content').innerHTML = `
    ${renderCards(stats)}
    <div class="section-title">Win Rate by Prop Type</div>
    <div class="chart-box">${renderTypeTable(stats.by_type)}</div>
    <div class="section-title">Graded Props${filtered.length < ALL_PROPS.length ? ' (filtered)' : ''}</div>
    <div class="chart-box" style="padding:0;overflow:hidden">${renderRecentTable(filtered)}</div>
  `;
}

function setFilter(key, val) {
  filters[key] = val;
  renderAll();
}

async function init() {
  try {
    const res = await fetch('/api/prop_stats');
    const d = await res.json();
    if (!d.ok || d.graded === false) {
      document.getElementById('ps-content').innerHTML = `<div class="no-data">
        <div class="icon">📊</div>
        <p>No graded props yet.<br>Run the grader script after games finish.</p>
      </div>`;
      return;
    }
    ALL_PROPS = d.recent;
    TEAMS = [...new Set(ALL_PROPS.map(r => r.player_team).filter(Boolean))].sort();
    PROP_TYPES = [...new Set(ALL_PROPS.map(r => r.prop_type).filter(Boolean))].sort();
    renderAll();
  } catch(e) {
    document.getElementById('ps-content').innerHTML = `<div class="no-data"><div class="icon">⚠️</div><p>Failed to load prop stats.</p></div>`;
  }
}

init();
</script>

{% endblock %}
